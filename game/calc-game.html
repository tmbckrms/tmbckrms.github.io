<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fancy Easter Egg Calculator</title>
<style>
/* Default Calculator Theme */
body {
    font-family: "Segoe UI", sans-serif;
    background: linear-gradient(135deg, #1e3c72, #2a5298);
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    margin: 0;
    color: #fff;
    transition: background 0.5s;
}
.app-container {
    display: flex;
    gap: 25px;
    align-items: flex-start;
    justify-content: center;
    width: 95%;
    max-width: 1000px;
}
.calculator-panel {
    flex: 1;
}

.calculator {
    background: rgba(255, 255, 255, 0.1);
    border-radius: 20px;
    padding: 20px;
    box-shadow: 0 0 20px rgba(0, 0, 0, 0.4);
}
.easter-panel {
    width: 320px;
    background: rgba(255, 255, 255, 0.08);
    border-radius: 20px;
    padding: 20px;
    box-shadow: 0 0 20px rgba(0, 0, 0, 0.4);

    display: flex;
    flex-direction: column;
    gap: 15px;
}
.calculator {
    background: rgba(255, 255, 255, 0.1);
    border-radius: 15px;
    padding: 20px;
    width: 320px;
    max-height: 90vh;
    overflow-y: auto;
    box-shadow: 0 0 20px rgba(0, 0, 0, 0.5);
    transition: background 0.5s;
}

#display {
    width: 100%;
    font-size: 1.5em;
    padding: 10px;
    margin-bottom: 15px;
    border-radius: 8px;
    border: none;
    text-align: right;
    background: rgba(255, 255, 255, 0.2);
    color: #fff;
    transition: background 0.5s, color 0.5s;
}

.buttons {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    grid-auto-rows: 60px;
    gap: 10px;
}

.buttons button {
    font-size: 1.2em;
    border: none;
    border-radius: 10px;
    background: rgba(255, 255, 255, 0.2);
    color: #fff;
    cursor: pointer;
    transition: 0.2s, background 0.5s, color 0.5s;
}

.buttons button:hover {
    background: rgba(255, 255, 255, 0.4);
}

#easterEggsButton {
    margin-top: 15px;
    width: 100%;
    padding: 10px;
    border-radius: 10px;
    background: #ff6f61;
    cursor: pointer;
    border: none;
    font-size: 1em;
    font-weight: bold;
    color: #fff;
    transition: background 0.5s, color 0.5s;
}

#notifier {
    margin-top: 10px;
    font-weight: bold;
    text-align: center;
    min-height: 20px;
}

.slot-machine {
    display: flex;
    justify-content: space-around;
    font-size: 2em;
    margin-top: 10px;
}

/* Peace Theme */
body.peace-theme {
    background: linear-gradient(135deg, #143d22, #2f5d3a, #608066);
    color: #f1f7f3;
    text-shadow: 0 1px 3px rgba(0,0,0,0.3);
}

body.peace-theme .calculator {
    background: rgba(255, 255, 255, 0.12);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border: 1px solid rgba(255, 255, 255, 0.2);
    box-shadow: 0 15px 35px rgba(10, 30, 15, 0.5);
}

body.peace-theme #display {
    background: rgba(255, 255, 255, 0.25);
    color: #ffffff;
    border: 1px solid rgba(255, 255, 255, 0.15);
    text-shadow: 0 1px 2px rgba(0, 0, 0, 0.2);
}

body.peace-theme #display::placeholder {
    color: rgba(255, 255, 255, 0.6);
}

body.peace-theme .buttons button {
    background: rgba(255, 255, 255, 0.15);
    color: #ffffff;
    border: 1px solid rgba(255, 255, 255, 0.1);
    border-radius: 12px;
}

body.peace-theme .buttons button:hover {
    background: rgba(255, 255, 255, 0.3);
    box-shadow: 0 0 12px rgba(168, 230, 207, 0.4);
    transform: translateY(-1px);
}

body.peace-theme #easterEggsButton {
    background: #41724e;
    color: #fff;
    border: 1px solid rgba(255,255,255,0.2);
    box-shadow: 0 4px 15px rgba(30, 60, 40, 0.3);
}

body.peace-theme #easterEggsButton:hover {
    background: #4f875d;
}

/* Animations Architecture */
@keyframes gentleBreeze {
    0% { transform: rotate(-3deg) scale(1); }
    100% { transform: rotate(4deg) scale(1.05); }
}

@keyframes naturalGradient {
    0% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
}

/* Easter Egg list styling */
.easter-egg-list {
    display: none; /* hidden by default */
    max-height: 200px;
    overflow-y: auto;
    padding: 15px;
    margin-top: 15px;
    margin-bottom: 10px;
    background: rgba(0, 0, 0, 0.4);
    border-radius: 15px;
    box-shadow: 0 4px 20px rgba(0, 0, 0, 0.6);
    font-size: 0.95em;
    color: #fff;
    text-align: left;
    transition: opacity 0.4s ease, transform 0.4s ease;
}

.easter-egg-list.show {
    display: block;
    opacity: 1;
    transform: translateY(0);
}

.easter-egg-item {
    margin-bottom: 8px;
    padding: 5px 10px;
    border-radius: 8px;
    background: rgba(255, 255, 255, 0.1);
    display: flex;
    justify-content: space-between;
    align-items: center;
    transition: background 0.3s;
}

.easter-egg-item.discovered {
    background: rgba(0, 255, 0, 0.2);
    color: #bfff00;
}

.easter-egg-item span.status {
    font-weight: bold;
    margin-left: 10px;
}

.egg-controls {
    display: flex;
    align-items: center;
    gap: 8px;
}

/* Overlay background */
.overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.65);
    backdrop-filter: blur(8px);
    display: flex;
    justify-content: center;
    align-items: center;
    z-index: 9999;
}

/* hidden state */
.overlay.hidden {
    display: none;
}

/* popup box */
.overlay-card {
    width: 350px;
    max-width: 90%;
    background: rgba(20,20,30,0.95);
    padding: 20px;
    border-radius: 15px;
    position: relative;
    color: white;
    box-shadow: 0 0 25px rgba(0,0,0,0.6);
}

/* close button */
.close-overlay {
    position: absolute;
    top: 8px;
    right: 10px;
    background: none;
    border: none;
    font-size: 1.2em;
    color: white;
    cursor: pointer;
}

.close-overlay:hover {
    color: red;
}

.info-icon {
    cursor: pointer;
    font-size: 0.9em;
    opacity: 0.8;
    transition: 0.2s;
}

.info-icon:hover {
    opacity: 1;
    transform: scale(1.2);
    color: #00d9ff;
}

.news-bar {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    background: #111;
    color: #fff;
    font-size: 1em;
    padding: 8px 0;
    overflow: hidden;
    white-space: nowrap;
    border-bottom: 2px solid #444;
    z-index: 1000;
}

.news-content {
    display: inline-block;
    padding-left: 100%;
    animation: scrollNews 50s linear infinite;
}

@keyframes scrollNews {
    from {
        transform: translateX(0%);
    }
    to {
        transform: translateX(-100%);
    }
}

/* Push calculator down below news bar */
.calculator {
    margin-top: 60px;
}
@media (max-width: 850px) {
    .app-container {
        flex-direction: column;
        align-items: center;
    }

    .easter-panel {
        width: 100%;
        max-width: 400px;
    }

    .calculator-panel {
        width: 100%;
        max-width: 400px;
    }
}

</style>
</head>
<body>
<div class="app-container">
    <div class="calculator-panel">
        <div class="calculator">
            <input type="text" id="display" placeholder="0">
            <div class="buttons">
                <button onclick="appendValue('7')">7</button>
                <button onclick="appendValue('8')">8</button>
                <button onclick="appendValue('9')">9</button>
                <button onclick="appendValue('/')">/</button>
                <button onclick="appendValue('4')">4</button>
                <button onclick="appendValue('5')">5</button>
                <button onclick="appendValue('6')">6</button>
                <button onclick="appendValue('*')">*</button>
                <button onclick="appendValue('1')">1</button>
                <button onclick="appendValue('2')">2</button>
                <button onclick="appendValue('3')">3</button>
                <button onclick="appendValue('-')">-</button>
                <button onclick="appendValue('0')">0</button>
                <button onclick="appendValue('.')">.</button>
                <button onclick="calculate()">=</button>
                <button onclick="appendValue('+')">+</button>
                <button onclick="clearDisplay()" style="grid-column: span 4; background:#ff4444;">C</button>
            </div>
        </div>
    </div>
    <div class="easter-panel">
        <h2>✨ Easter Eggs</h2>
        <button id="easterEggsButton" onclick="showAllEasterEggs()"> Show Easter Eggs </button>
        <div class="easter-egg-list" id="easterEggList"></div>
        <div id="notifier"></div>
        <div id="slotMachineContainer"></div>
    </div>
</div>

<div id="eggOverlay" class="overlay hidden" onclick="handleOverlayClick(event)">
    
    <div class="overlay-card">
        <button class="close-overlay" onclick="closeOverlay()">
            ✖
        </button>

        <h2 id="overlayTitle"></h2>
        <p id="overlayDescription"></p>
    </div>

</div>

<script>
let display = document.getElementById('display');
let notifier = document.getElementById('notifier');
let discoveredEasterEggs = new Set();
let gamblingSpeed = 600;
let gamblingInterval;
let gamblingActive = false;
let slotInterval = [];
let slotValues = ["🍒","🍋","🍊","🍇","⭐","💎"];
let currentSlots = ["","",""];
let stoppedSlots = 0;

const easterEggs = {
    "Against The Fight": {trigger: "peace", description: "The calculator briefly stopped calculating wars. Humanity was confused", action: () => activatePeaceTheme()},
    "How Beautiful": {trigger: "the Moon is freaking bad", description: "Do not stare at the Moon for too long. It has started recognizing users.", action: () => moonAnimation()},
    "Lucky": {trigger: "gambling", description: "99% of calculator users quit before winning absolutely nothing.", action: () => startGambling()},
    "Stupid": {trigger: "1+1", description: "A groundbreaking mathematical discovery has been reported by nobody.", action: () => stupidEffect()},
    "The Best Hello": {trigger: "Hello Calculator", description: "The calculator has acknowledged your existence. Regret imminent.", action: () => helloUser()},
    "News": {trigger: "news", description: "Journalism died the moment this calculator became self-aware.", action: function() {startNewsTicker();}},
    "The Observer": {trigger: "who are you", description: "The system became uncomfortable after being questioned", action: () => observerMode()},
    "Corrupted": {trigger: "theme.exe", description: "Several UI guidelines were harmed during testing.", action: () => corruptedTheme()},
    "Finally Ended": {trigger: "LOCKED_STATE_PROGRESSION", description: "It ended. Or...", action: () => finallyEnded()}
};

function checkProgression(newlyUnlockedKey) {
    // 1. Safety net: Never log the endgame itself as a prerequisite requirement
    if (newlyUnlockedKey === "Finally Ended") return;

    // 2. Gather all true gameplay requirements dynamically from your map keys 
    // This will generate an array of everything EXCEPT "Finally Ended"
    const standardRequirements = Object.keys(easterEggs).filter(key => key !== "Finally Ended");

    // 3. Simple Anti-Cheat Verification: Ensure EVERY mandatory key is strictly present 
    const allEggsDiscovered = standardRequirements.every(eggKey => discoveredEasterEggs.has(eggKey));

    if (allEggsDiscovered) {
        // Delay the apocalypse by 1.5 seconds so the final puzzle input's splash text can settle
        setTimeout(() => {
            if (typeof easterEggs["Finally Ended"]?.action === "function") {
                easterEggs["Finally Ended"].action();
            }
        }, 1500);
    }
}

function appendValue(val) {
    display.value += val;
}

function clearDisplay() {
    display.value = '';
    notifier.textContent = '';
}

function calculate() {
    let val = display.value.trim().toLowerCase(); // ignore case

    // 🎰 If gambling is active, pressing "=" should stop one slot
    if (gamblingActive) {
        stopOneSlot();
        return;
    }
    
    if (display.value.trim() === '' || display.value === 'undefined') {
        display.value = "Well type something!!!";
        return;
    }

// Check Easter Eggs
    for (let key in easterEggs) {
        if (val === easterEggs[key].trigger.toLowerCase()) {
            
            // 🛑 ANTI-CHEAT SHIELD: Prevent users from bypassing the puzzle by typing the hidden key
            if (key === "Finally Ended") {
                display.value = "CHESS PLAYER RULES APPLIED: CHEATING DETECTED.";
                notifier.textContent = "❌ Progression state insufficient.";
                return;
            }

            if (!discoveredEasterEggs.has(key)) {
                notifier.textContent = `🎉 Easter Egg Found: ${key}`;
                discoveredEasterEggs.add(key);
                refreshEasterEggList();
            }
            
            easterEggs[key].action();
            display.value = '';

            // 🔍 INSPECTOR CALL: Run the state progression checker right here
            checkProgression(key);
            return;
        }
    }

    // Normal calculation
    try {
        let result = eval(display.value);
        display.value = result;
    } catch(e) {
        display.value = 'Error';
    }
}


function activatePeaceTheme() {
    document.body.classList.add('peace-theme');
    notifier.textContent = "🌿 Nature breathes life into the grid...";

    // 1. Inject drifting leaf animation rules dynamically if missing
    if (!document.getElementById('natureLeafStyles')) {
        const styleSheet = document.createElement("style");
        styleSheet.id = 'natureLeafStyles';
        styleSheet.textContent = `
            @keyframes leafDrift {
                0% {
                    transform: translateY(-50px) translateX(0) rotate(0deg);
                    opacity: 0;
                }
                10% { opacity: 0.6; }
                90% { opacity: 0.6; }
                100% {
                    transform: translateY(105vh) translateX(var(--leaf-sway)) rotate(var(--leaf-turn));
                    opacity: 0;
                }
            }
        `;
        document.head.appendChild(styleSheet);
    }

    // 2. Generate smooth, peaceful drifting leaves
    const leaves = ["🍃", "🍁", "🌱", "🌸"];
    const totalLeaves = 20;

    for (let i = 0; i < totalLeaves; i++) {
        setTimeout(() => {
            // Stop generating if the user cleared the theme in the meantime
            if (!document.body.classList.contains('peace-theme')) return;

            const leaf = document.createElement('span');
            leaf.textContent = leaves[Math.floor(Math.random() * leaves.length)];
            
            // Randomize spatial characteristics
            const startX = Math.random() * window.innerWidth;
            const sway = (Math.random() * 120 - 60) + 'px';
            const spin = (Math.random() * 360 + 180) + 'deg';
            const scale = 0.8 + Math.random() * 1.2;
            const duration = 4000 + Math.random() * 4000; // Slow, tranquil descent

            leaf.style.setProperty('--leaf-sway', sway);
            leaf.style.setProperty('--leaf-turn', spin);

            // Base configurations
            leaf.style.position = 'fixed';
            leaf.style.left = startX + 'px';
            leaf.style.top = '-50px';
            leaf.style.fontSize = scale + 'rem';
            leaf.style.zIndex = '0'; // Placed behind the calculator panels gracefully
            leaf.style.pointerEvents = 'none';
            leaf.style.userSelect = 'none';
            
            // Apply soft, natural environment blending
            leaf.style.filter = 'drop-shadow(0 4px 6px rgba(0,0,0,0.15)) blur(0.5px)';
            leaf.style.animation = `leafDrift ${duration}ms cubic-bezier(0.37, 0, 0.63, 1) forwards`;

            document.body.appendChild(leaf);

            // Clean up elements from DOM perfectly
            setTimeout(() => leaf.remove(), duration + 100);

        }, i * 300); // Staggered soothing entrance
    }
}

function moonAnimation() {
    notifier.textContent = "🌙 The Moon is watching...";

    // 1. Inject structural animations
    if (!document.getElementById('moonVoidStyles')) {
        const styleSheet = document.createElement("style");
        styleSheet.id = 'moonVoidStyles';
        styleSheet.textContent = `
            @keyframes voidPulse {
                0% { background: radial-gradient(circle at center, #111218 0%, #000000 100%); }
                50% { background: radial-gradient(circle at center, #050508 0%, #000000 100%); }
                100% { background: radial-gradient(circle at center, #111218 0%, #000000 100%); }
            }
            @keyframes whisperDrift {
                0% { transform: translateY(0) translateX(0); filter: blur(2px); }
                50% { transform: translateY(var(--drift-y)) translateX(var(--drift-x)); filter: blur(0px); }
                100% { transform: translateY(calc(var(--drift-y) * 2)) translateX(calc(var(--drift-x) * 2)); filter: blur(3px); }
            }
        `;
        document.head.appendChild(styleSheet);
    }

    document.body.style.animation = 'voidPulse 4s ease-in-out infinite';
    document.body.style.color = '#cfcfff';

    // 2. Create the All-Seeing Eye
    let moon = document.createElement('div');
    moon.textContent = "👁️‍🗨️";
    moon.style.position = 'fixed';
    moon.style.left = '50%';
    moon.style.top = '40%';
    moon.style.transform = 'translate(-50%, -50%) scale(0.1)';
    moon.style.fontSize = '8rem';
    moon.style.opacity = '0';
    moon.style.zIndex = '9998';
    moon.style.pointerEvents = 'none';
    // Slower transition (2 seconds instead of 1.5) for grander movement
    moon.style.transition = 'all 2s cubic-bezier(0.16, 1, 0.3, 1)';
    document.body.appendChild(moon);

    // 3. Create the Main Narrative Text Display element
    let phaseText = document.createElement('div');
    phaseText.style.position = 'fixed';
    phaseText.style.left = '50%';
    phaseText.style.top = '75%';
    phaseText.style.transform = 'translate(-50%, -50%) scale(0.9)';
    phaseText.style.width = '90%';
    phaseText.style.textAlign = 'center';
    phaseText.style.fontFamily = '"Courier New", monospace';
    phaseText.style.fontWeight = 'bold';
    phaseText.style.opacity = '0';
    phaseText.style.zIndex = '9999';
    phaseText.style.pointerEvents = 'none';
    // Slower text fade transitions
    phaseText.style.transition = 'all 1.2s ease-out';
    document.body.appendChild(phaseText);

    // 4. Background whisper loop (Fewer and less distracting)
    let whisperElems = [];
    let whispers = ["It knows what you calculated...",
        "Don't look away.",
        "The grid is bleeding.",
        "Luna subest...",
        "Look behind the monitor.",
        "Everything is in its eye.",
        "Suffer.",
        "01001000 01000101 01001100 01010000", // Binary for HELP
        "👁️"]
    let i = 0;
    let whisperInterval = setInterval(() => {
        let w = document.createElement('div');
        w.textContent = whispers[i % whispers.length];
        i++;
        w.style.setProperty('--drift-x', (Math.random() * 40 - 20) + 'px');
        w.style.setProperty('--drift-y', (Math.random() * -50 - 20) + 'px');
        w.style.position = 'fixed';
        w.style.left = (Math.random() * 70 + 15) + '%';
        w.style.top = (Math.random() * 50 + 20) + '%';
        w.style.fontSize = '0.95rem';
        w.style.opacity = '0';
        w.style.color = '#cfcfff';
        w.style.textShadow = '0 0 8px rgba(153, 153, 255, 0.3)';
        w.style.zIndex = '9996';
        w.style.animation = 'whisperDrift 5s ease-in-out infinite alternate';
        document.body.appendChild(w);
        whisperElems.push(w);
        setTimeout(() => { if (w) w.style.opacity = '0.35'; }, 50);
    }, 1200);

    // 5. EXTENDED TIMELINE (Slowing everything down)

    // --- Spawn Sequence ---
    setTimeout(() => {
        if (!moon) return;
        moon.style.opacity = '0.75';
        moon.style.transform = 'translate(-50%, -50%) scale(1)';
        moon.style.textShadow = '0 0 30px #b0b0ff, 0 0 60px #444499';
    }, 200);

    // --- PHASE 1 (Appears at 3 seconds, stays active for 4.5 seconds) ---
    setTimeout(() => {
        if (!moon || !phaseText) return;
        moon.style.transform = 'translate(-50%, -50%) scale(1.25)';
        moon.style.textShadow = '0 0 40px #ffb0b0, 0 0 70px #883333';

        phaseText.textContent = "\"You know what's going on.\"";
        phaseText.style.fontSize = '1.9rem';
        phaseText.style.color = '#e0e0ff';
        phaseText.style.textShadow = '-2px -2px 0 #000, 2px -2px 0 #000, -2px 2px 0 #000, 2px 2px 0 #000, 0 0 15px rgba(176,176,255,0.6)';
        phaseText.style.opacity = '1';
        phaseText.style.transform = 'translate(-50%, -50%) scale(1)';
    }, 3000);

    // --- PHASE 2 (Appears at 7.5 seconds, stays active for 5 seconds) ---
    setTimeout(() => {
        if (!moon || !phaseText) return;
        moon.style.transform = 'translate(-50%, -50%) scale(1.75)';
        moon.style.textShadow = '0 0 50px #ff6666, 0 0 90px #aa1111';

        phaseText.style.opacity = '0';
        setTimeout(() => {
            phaseText.textContent = "\"Don't deny us, we are waiting for you.\"";
            phaseText.style.fontSize = '2.3rem';
            phaseText.style.color = '#ffb0b0';
            phaseText.style.textShadow = '-3px -3px 0 #000, 3px -3px 0 #000, -3px 3px 0 #000, 3px 3px 0 #000, 0 0 25px #ff3333';
            phaseText.style.opacity = '1';
        }, 300);
    }, 7500);

    // --- PHASE 3 (Appears at 12.5 seconds, stays active for 6 seconds) ---
    setTimeout(() => {
        if (!moon || !phaseText) return;
        moon.style.transform = 'translate(-50%, -50%) scale(2.4)';
        moon.style.textShadow = '0 0 70px #ff0000, 0 0 150px #ff0000, 0 0 200px #550000';

        phaseText.style.opacity = '0';
        setTimeout(() => {
            phaseText.textContent = "\"Come with us.\"";
            phaseText.style.fontSize = '3.6rem';
            phaseText.style.color = '#ff3333';
            phaseText.style.textShadow = '-4px -4px 0 #000, 4px -4px 0 #000, -4px 4px 0 #000, 4px 4px 0 #000, 0 0 35px #ff0000, 0 0 60px #000';
            phaseText.style.opacity = '1';
            phaseText.style.transform = 'translate(-50%, -50%) scale(1.05)';
        }, 300);
    }, 12500);

    // 6. Complete Clean up sequence (Starts at 18.5 seconds)
    setTimeout(() => {
        clearInterval(whisperInterval);

        if (moon) {
            moon.style.transition = 'all 3s ease-in-out'; // Much slower fade away
            moon.style.opacity = '0';
            moon.style.transform = 'translate(-50%, -50%) scale(4)';
            moon.style.filter = 'blur(30px)';
        }

        if (phaseText) {
            phaseText.style.transition = 'all 2.5s ease-in-out';
            phaseText.style.opacity = '0';
            phaseText.style.filter = 'blur(15px)';
            phaseText.style.transform = 'translate(-50%, -50%) scale(0.6)';
        }

        whisperElems.forEach(w => {
            if (w) {
                w.style.transition = 'opacity 2s ease';
                w.style.opacity = '0';
            }
        });

        // Fully clean up and return to standard calculator style at 21.5 seconds total
        setTimeout(() => {
            if (moon) moon.remove();
            if (phaseText) phaseText.remove();
            whisperElems.forEach(w => { if (w) w.remove(); });
            document.body.style.animation = '';
            document.body.style.background = '';
            document.body.style.color = '';
        }, 3000);
    }, 18500);
}


function helloUser() {

function emojiRain(emojis) {
    const totalCount = 100; // Increased count for higher density
    
    // Create a dynamic styles block if it doesn't exist yet to hold fancy 3D animations
    if (!document.getElementById('fancyRainStyles')) {
        const styleSheet = document.createElement("style");
        styleSheet.id = 'fancyRainStyles';
        styleSheet.textContent = `
            @keyframes fancyFall {
                0% {
                    transform: translateY(-50px) translateX(0) rotate(0deg) scale(0.5);
                    opacity: 0;
                }
                10% {
                    opacity: 1;
                    transform: translateY(0vh) translateX(var(--sway-amount)) rotate(var(--rot-start)) scale(1);
                }
                90% {
                    opacity: 1;
                }
                100% {
                    transform: translateY(105vh) translateX(calc(var(--sway-amount) * -1)) rotate(var(--rot-end)) scale(0.7);
                    opacity: 0;
                }
            }
        `;
        document.head.appendChild(styleSheet);
    }

    for (let i = 0; i < totalCount; i++) {
        setTimeout(() => {
            const span = document.createElement('span');
            span.textContent = emojis[Math.floor(Math.random() * emojis.length)];

            // Custom randomized properties for organic variety
            const randomXStart = Math.random() * window.innerWidth;
            const randomSway = (Math.random() * 80 - 40) + 'px'; // Sway left/right randomly
            const rotationStart = (Math.random() * 360) + 'deg';
            const rotationEnd = (Math.random() * 720 - 360) + 'deg'; // Multi-spin fall
            const randomScale = 0.8 + Math.random() * 1.8; // Varied sizes (tiny to massive)
            const duration = 1500 + Math.random() * 1500; // Fast vs slow particles

            // Pass variables to CSS via custom properties
            span.style.setProperty('--sway-amount', randomSway);
            span.style.setProperty('--rot-start', rotationStart);
            span.style.setProperty('--rot-end', rotationEnd);

            // Base styling
            span.style.position = 'fixed';
            span.style.left = randomXStart + 'px';
            span.style.top = '-60px';
            span.style.fontSize = randomScale + 'rem';
            span.style.zIndex = '9999';
            span.style.pointerEvents = 'none'; // Prevent blocking calculator clicks
            span.style.userSelect = 'none';
            
            // Apply text-glow to give them a premium, shiny feel
            span.style.textShadow = '0 0 8px rgba(255, 255, 255, 0.6), 0 4px 10px rgba(0, 0, 0, 0.3)';

            // Trigger the hardware-accelerated animation
            span.style.animation = `fancyFall ${duration}ms cubic-bezier(0.25, 0.46, 0.45, 0.94) forwards`;

            document.body.appendChild(span);

            // Clean up elements smoothly after animation finishes
            setTimeout(() => span.remove(), duration + 100);

        }, i * 40); // Slightly faster staggered spawn rate
    }
